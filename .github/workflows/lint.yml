name: Lint

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run golden-rule linter
        # Known debt: silijian.md (162 lines) and yushi.md (103 lines) exceed 80-line Rule 1 limit.
        # Tracked for future refactor. Remove continue-on-error once violations are resolved.
        continue-on-error: true
        run: python3 src/chaoting_lint.py
